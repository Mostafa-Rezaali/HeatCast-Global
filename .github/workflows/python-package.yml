# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "codex/tube_v1" ]
  pull_request:
    branches: [ "codex/tube_v1" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Compile core scripts
      run: |
        python -m py_compile \
          cfm_mesh_train.py mesh_backbone.py mode_dispatch.py icosahedral_mesh.py \
          stitch_hindcast_tac.py tac_skill_maps.py summarize_hindcast_diagnostics.py \
          compute_baselines.py export_per_year_stats.py bootstrap_significance.py \
          exceedance_eval.py
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        if find . \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
          pytest
        else
          echo "No pytest tests found; skipping pytest."
        fi
